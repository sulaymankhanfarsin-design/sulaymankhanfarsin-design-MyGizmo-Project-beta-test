{% extends "base.html" %}

{% block title %}Word & Character Counter - My Gizmo{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
    
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
        Word & Character Counter
    </h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-gray-50 p-4 rounded-lg text-center shadow-sm">
            <p class="text-sm font-medium text-gray-500">Words</p>
            <p id="word-count" class="text-3xl font-bold text-[#2a4a87] mt-1">0</p>
        </div>
        <div class="bg-gray-50 p-4 rounded-lg text-center shadow-sm">
            <p class="text-sm font-medium text-gray-500">Characters</p>
            <p id="char-count" class="text-3xl font-bold text-[#2a4a87] mt-1">0</p>
        </div>
        <div class="bg-gray-50 p-4 rounded-lg text-center shadow-sm">
            <p class="text-sm font-medium text-gray-500">Paragraphs</p>
            <p id="para-count" class="text-3xl font-bold text-[#2a4a87] mt-1">0</p>
        </div>
    </div>

    <div class="mb-6">
        <textarea 
            id="text-input" 
            placeholder="Type or paste your text here..."
            rows="12"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#35a9e0] focus:border-[#35a9e0] outline-none transition-shadow text-gray-800"
        ></textarea>
    </div>

    <button id="clear-btn" class="w-full p-3 bg-red-100 text-red-700 font-medium rounded-lg hover:bg-red-200 transition-colors focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-offset-2">
        Clear Text
    </button>
</div>

<script>
    const textInput = document.getElementById('text-input');
    const wordCountEl = document.getElementById('word-count');
    const charCountEl = document.getElementById('char-count');
    const paraCountEl = document.getElementById('para-count');
    const clearBtn = document.getElementById('clear-btn');

    function updateCounts() {
        const text = textInput.value;

        // Character count
        charCountEl.textContent = text.length;

        // Word count
        const words = text.match(/\b\w+\b/g);
        wordCountEl.textContent = words ? words.length : 0;

        // Paragraph count
        const paragraphs = text.split('\n').filter(p => p.trim().length > 0);
        paraCountEl.textContent = paragraphs.length > 0 ? paragraphs.length : (text.length > 0 ? 1 : 0);
    }

    textInput.addEventListener('input', updateCounts);

    clearBtn.addEventListener('click', () => {
        textInput.value = '';
        updateCounts();
    });
</script>
{% endblock %}
