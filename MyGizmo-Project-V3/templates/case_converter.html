{% extends "base.html" %}

{% block title %}Case Converter - My Gizmo{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
    
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
        Case Converter
    </h1>

    <div class="mb-6">
        <textarea 
            id="text-input" 
            placeholder="Type or paste your text here to convert its case..."
            rows="12"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#35a9e0] focus:border-[#35a9e0] outline-none transition-shadow text-gray-800"
        ></textarea>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <button id="btn-upper" class="p-3 font-semibold text-white bg-teal-500 rounded-lg hover:bg-teal-600 transition-all shadow">UPPER CASE</button>
        <button id="btn-lower" class="p-3 font-semibold text-white bg-teal-500 rounded-lg hover:bg-teal-600 transition-all shadow">lower case</button>
        <button id="btn-title" class="p-3 font-semibold text-white bg-teal-500 rounded-lg hover:bg-teal-600 transition-all shadow">Title Case</button>
        <button id="btn-sentence" class="p-3 font-semibold text-white bg-teal-500 rounded-lg hover:bg-teal-600 transition-all shadow">Sentence case</button>
    </div>
    
    <div class="grid grid-cols-2 gap-4">
        <button id="btn-copy" class="w-full p-3 bg-gray-200 text-gray-800 font-medium rounded-lg hover:bg-gray-300 transition-colors">Copy to Clipboard</button>
        <button id="btn-clear" class="w-full p-3 bg-red-100 text-red-700 font-medium rounded-lg hover:bg-red-200 transition-colors">Clear Text</button>
    </div>
</div>

<script>
    const textInput = document.getElementById('text-input');
    
    document.getElementById('btn-upper').addEventListener('click', () => {
        textInput.value = textInput.value.toUpperCase();
    });

    document.getElementById('btn-lower').addEventListener('click', () => {
        textInput.value = textInput.value.toLowerCase();
    });

    document.getElementById('btn-title').addEventListener('click', () => {
        textInput.value = textInput.value.toLowerCase().replace(/\b\w/g, char => char.toUpperCase());
    });

    document.getElementById('btn-sentence').addEventListener('click', () => {
        textInput.value = textInput.value.toLowerCase().replace(/(^\w{1}|\.\s*\w{1})/g, char => char.toUpperCase());
    });

    document.getElementById('btn-copy').addEventListener('click', () => {
        navigator.clipboard.writeText(textInput.value);
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
        textInput.value = '';
    });
</script>
{% endblock %}
