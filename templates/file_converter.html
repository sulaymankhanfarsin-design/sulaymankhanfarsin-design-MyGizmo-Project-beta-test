{% extends "base.html" %}

{% block title %}File Converter - Farsin OS{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-lg text-center">
    
    <div class="flex items-center justify-center mb-6">
        <span class="text-4xl mr-2"></span>
        <h2 class="text-3xl font-extrabold text-gray-800">File Converter</h2>
    </div>
    <p class="text-gray-500 mb-8">Fast, smooth, and flexible file conversions.</p>

    <form id="converterForm" action="{{ url_for('handle_conversion') }}" method="POST" enctype="multipart/form-data">
        
        <div class="mb-6 text-left">
            <label class="block text-lg font-semibold text-gray-700 mb-2">1. Upload your File(s):</label>
            
            <!-- Drag & Drop Zone -->
            <div id="dropzone" class="relative border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center hover:border-teal-500 hover:bg-teal-50 transition-all duration-300 cursor-pointer bg-gray-50 group">
                <input id="file-upload" name="file" type="file" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" required>
                <div class="space-y-3 pointer-events-none">
                    <div class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center mx-auto text-teal-500 group-hover:scale-110 transition-transform duration-300">
                        <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-base font-semibold text-gray-700">Drag & Drop your files here</p>
                        <p class="text-sm text-gray-500 mt-1">or click to browse</p>
                    </div>
                </div>
            </div>

            <!-- Selected File Preview -->
            <div id="filePreview" class="hidden mt-4 bg-white border border-gray-200 rounded-xl p-4 flex items-center justify-between shadow-sm">
                <div class="flex items-center space-x-4 overflow-hidden">
                    <div class="w-10 h-10 bg-teal-100 text-teal-600 rounded-lg flex items-center justify-center shrink-0">
                        <i data-lucide="file" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p id="file-name" class="text-sm font-bold text-gray-700 truncate"></p>
                        <p class="text-xs text-gray-500">Ready to convert</p>
                    </div>
                </div>
                <button type="button" id="removeFile" class="text-red-500 hover:text-red-700 p-2 rounded-lg hover:bg-red-50 transition-colors" title="Remove files">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <div class="mb-8 text-left">
            <label for="conversion-type" class="block text-lg font-semibold text-gray-700 mb-2">2. Choose conversion:</label>
            <div class="relative">
                <select id="conversion-type" name="conversion_type" class="block appearance-none w-full bg-gray-50 border border-gray-300 text-gray-700 py-3 px-4 pr-8 rounded-lg leading-tight focus:outline-none focus:bg-white focus:border-teal-500">
                    <option value="jpg_to_pdf">JPG to PDF</option>
                    <option value="pdf_to_jpg">PDF to JPG</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                    <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="w-full p-4 font-semibold text-white bg-gradient-to-r from-orange-500 to-blue-600 rounded-lg hover:from-orange-600 hover:to-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-500 transform hover:-translate-y-1 transition-all shadow-lg flex items-center justify-center gap-2">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            <span>Convert Now</span>
        </button>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('file-upload');
        const filePreview = document.getElementById('filePreview');
        const fileNameSpan = document.getElementById('file-name');
        const removeFile = document.getElementById('removeFile');
        const form = document.getElementById('converterForm');
        const submitBtn = document.getElementById('submitBtn');

        // Handle File Selection
        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                showPreview(this.files);
            }
        });

        // Handle Drag Events
        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
            dropzone.addEventListener(eventName, () => dropzone.classList.add('border-teal-500', 'bg-teal-50'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
            dropzone.addEventListener(eventName, () => dropzone.classList.remove('border-teal-500', 'bg-teal-50'), false);
        });

        // Handle Drop
        dropzone.addEventListener('drop', function(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files && files.length > 0) {
                fileInput.files = files;
                showPreview(files);
            }
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function showPreview(files) {
            if (files.length === 1) {
                fileNameSpan.textContent = files[0].name;
            } else {
                fileNameSpan.textContent = `${files.length} files selected`;
            }
            filePreview.classList.remove('hidden');
            dropzone.classList.add('hidden');
        }

        // Remove Selected File
        removeFile.addEventListener('click', function() {
            fileInput.value = '';
            filePreview.classList.add('hidden');
            dropzone.classList.remove('hidden');
        });

        // Handle Form Submission with Fetch API
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (fileInput.files.length === 0) {
                showToast('Please select at least one file.', 'error');
                return;
            }

            const formData = new FormData(form);
            const originalBtnHtml = submitBtn.innerHTML;
            
            // Loading State
            submitBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Converting...</span>';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => { throw new Error(err.error || 'Conversion failed'); });
                }
                
                const disposition = response.headers.get('Content-Disposition');
                let filename = 'download';
                if (disposition && disposition.indexOf('attachment') !== -1) {
                    const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                    const matches = filenameRegex.exec(disposition);
                    if (matches != null && matches[1]) { 
                        filename = matches[1].replace(/['"]/g, '');
                    }
                }
                return response.blob().then(blob => ({ blob, filename }));
            })
            .then(({ blob, filename }) => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                
                showToast('Conversion successful! Download started.', 'success');
                
                // Reset form
                fileInput.value = '';
                filePreview.classList.add('hidden');
                dropzone.classList.remove('hidden');
            })
            .catch(error => {
                showToast(error.message, 'error');
            })
            .finally(() => {
                // Restore button state
                submitBtn.innerHTML = originalBtnHtml;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                // Re-initialize lucide icons if needed
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            });
        });
    });
</script>
{% endblock %}
