{% extends "base.html" %}

{% block title %}Hash Generator - My Gizmo{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
    
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
        Hash Generator
    </h1>

    <div class="mb-6">
        <label for="text-input" class="block text-sm font-medium text-gray-700 mb-2">Input Text:</label>
        <textarea 
            id="text-input" 
            placeholder="Type or paste text to hash..."
            rows="6"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-shadow text-gray-800"
        ></textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div>
            <label for="hash-algo" class="block text-sm font-medium text-gray-700 mb-2">Algorithm</label>
            <select id="hash-algo" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
                <option value="SHA-256">SHA-256</option>
                <option value="SHA-512">SHA-512</option>
                <option value="SHA-1">SHA-1</option>
                <option value="MD5">MD5 (via JS)</option>
            </select>
        </div>
        <div class="flex items-end">
            <button id="btn-generate" class="w-full p-3 font-semibold text-white bg-gradient-to-r from-orange-500 to-blue-600 rounded-lg hover:from-orange-600 hover:to-blue-800 transition-all shadow-lg transform hover:-translate-y-1">
                Generate Hash
            </button>
        </div>
    </div>

    <div class="mb-6">
        <label for="hash-output" class="block text-sm font-medium text-gray-700 mb-2">Generated Hash:</label>
        <textarea 
            id="hash-output" 
            rows="3" 
            readonly 
            class="w-full p-3 font-mono text-sm border border-gray-300 rounded-lg bg-gray-50 text-gray-800 focus:outline-none"
        >Hash will appear here...</textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <button id="btn-copy" class="w-full p-3 bg-gray-200 text-gray-800 font-medium rounded-lg hover:bg-gray-300 transition-colors">Copy Hash</button>
        <button id="btn-clear" class="w-full p-3 bg-red-100 text-red-700 font-medium rounded-lg hover:bg-red-200 transition-colors">Clear All</button>
    </div>
</div>

<!-- Include CryptoJS for MD5 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script>
    const textInput = document.getElementById('text-input');
    const hashAlgo = document.getElementById('hash-algo');
    const hashOutput = document.getElementById('hash-output');
    const btnGenerate = document.getElementById('btn-generate');
    const btnCopy = document.getElementById('btn-copy');
    const btnClear = document.getElementById('btn-clear');

    async function generateHash() {
        const text = textInput.value;
        const algo = hashAlgo.value;

        if (!text) {
            hashOutput.value = 'Please enter some text to hash.';
            return;
        }

        try {
            if (algo === 'MD5') {
                const hash = CryptoJS.MD5(text).toString();
                hashOutput.value = hash;
            } else {
                const msgBuffer = new TextEncoder().encode(text);
                const hashBuffer = await crypto.subtle.digest(algo, msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                hashOutput.value = hashHex;
            }
        } catch (error) {
            hashOutput.value = 'Error generating hash: ' + error.message;
        }
    }

    btnGenerate.addEventListener('click', generateHash);
    textInput.addEventListener('input', generateHash);
    hashAlgo.addEventListener('change', generateHash);

    btnCopy.addEventListener('click', () => {
        if (!hashOutput.value || hashOutput.value.includes('Please enter')) return;
        hashOutput.select();
        navigator.clipboard.writeText(hashOutput.value);
        
        const originalText = btnCopy.textContent;
        btnCopy.textContent = 'Copied!';
        setTimeout(() => {
            btnCopy.textContent = originalText;
        }, 1500);
    });

    btnClear.addEventListener('click', () => {
        textInput.value = '';
        hashOutput.value = 'Hash will appear here...';
    });
</script>
{% endblock %}
