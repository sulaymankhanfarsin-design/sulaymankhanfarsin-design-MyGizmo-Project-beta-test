{% extends "base.html" %}

{% block title %}Strong Password Generator - My Gizmo{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
    
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
        Strong Password Generator
    </h1>

    <div class="mb-8 relative">
        <input 
            type="text" 
            id="password-output" 
            readonly 
            placeholder="Click generate to create password"
            class="w-full p-4 text-2xl font-mono text-center tracking-wider border-2 border-gray-200 rounded-xl bg-gray-50 text-gray-800 focus:outline-none"
        >
        <button id="btn-copy" class="absolute right-3 top-3 p-2 bg-teal-100 text-teal-700 rounded-lg hover:bg-teal-200 transition-colors" title="Copy to clipboard">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
        </button>
    </div>

    <div class="mb-8">
        <div class="flex justify-between mb-2">
            <label for="length-slider" class="text-sm font-medium text-gray-700">Password Length</label>
            <span id="length-display" class="text-sm font-bold text-teal-600">16</span>
        </div>
        <input 
            type="range" 
            id="length-slider" 
            min="8" 
            max="128" 
            value="16" 
            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-teal-500"
        >
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <label class="flex items-center space-x-3 p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
            <input type="checkbox" id="inc-uppercase" checked class="w-5 h-5 text-teal-600 rounded focus:ring-teal-500">
            <span class="text-gray-700 font-medium">Uppercase (A-Z)</span>
        </label>
        <label class="flex items-center space-x-3 p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
            <input type="checkbox" id="inc-lowercase" checked class="w-5 h-5 text-teal-600 rounded focus:ring-teal-500">
            <span class="text-gray-700 font-medium">Lowercase (a-z)</span>
        </label>
        <label class="flex items-center space-x-3 p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
            <input type="checkbox" id="inc-numbers" checked class="w-5 h-5 text-teal-600 rounded focus:ring-teal-500">
            <span class="text-gray-700 font-medium">Numbers (0-9)</span>
        </label>
        <label class="flex items-center space-x-3 p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
            <input type="checkbox" id="inc-symbols" checked class="w-5 h-5 text-teal-600 rounded focus:ring-teal-500">
            <span class="text-gray-700 font-medium">Symbols (!@#$%)</span>
        </label>
    </div>

    <button id="btn-generate" class="w-full p-4 font-semibold text-white bg-gradient-to-r from-orange-500 to-blue-600 rounded-xl hover:from-orange-600 hover:to-blue-800 transition-all shadow-lg transform hover:-translate-y-1 text-lg">
        Generate Password
    </button>
</div>

<script>
    const output = document.getElementById('password-output');
    const lengthSlider = document.getElementById('length-slider');
    const lengthDisplay = document.getElementById('length-display');
    const btnGenerate = document.getElementById('btn-generate');
    const btnCopy = document.getElementById('btn-copy');

    const incUpper = document.getElementById('inc-uppercase');
    const incLower = document.getElementById('inc-lowercase');
    const incNumbers = document.getElementById('inc-numbers');
    const incSymbols = document.getElementById('inc-symbols');

    const chars = {
        upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lower: 'abcdefghijklmnopqrstuvwxyz',
        numbers: '0123456789',
        symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-='
    };

    lengthSlider.addEventListener('input', (e) => {
        lengthDisplay.textContent = e.target.value;
    });

    function generatePassword() {
        let charSet = '';
        if (incUpper.checked) charSet += chars.upper;
        if (incLower.checked) charSet += chars.lower;
        if (incNumbers.checked) charSet += chars.numbers;
        if (incSymbols.checked) charSet += chars.symbols;

        if (charSet === '') {
            output.value = 'Please select at least one option';
            return;
        }

        let password = '';
        const length = parseInt(lengthSlider.value);
        
        if (incUpper.checked) password += chars.upper[Math.floor(Math.random() * chars.upper.length)];
        if (incLower.checked) password += chars.lower[Math.floor(Math.random() * chars.lower.length)];
        if (incNumbers.checked) password += chars.numbers[Math.floor(Math.random() * chars.numbers.length)];
        if (incSymbols.checked) password += chars.symbols[Math.floor(Math.random() * chars.symbols.length)];

        for (let i = password.length; i < length; i++) {
            password += charSet[Math.floor(Math.random() * charSet.length)];
        }

        password = password.split('').sort(() => 0.5 - Math.random()).join('');
        output.value = password;
    }

    btnGenerate.addEventListener('click', generatePassword);

    btnCopy.addEventListener('click', () => {
        if (!output.value || output.value === 'Please select at least one option') return;
        output.select();
        navigator.clipboard.writeText(output.value);
        
        const originalHTML = btnCopy.innerHTML;
        btnCopy.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>';
        btnCopy.classList.replace('text-teal-700', 'text-green-700');
        btnCopy.classList.replace('bg-teal-100', 'bg-green-100');
        
        setTimeout(() => {
            btnCopy.innerHTML = originalHTML;
            btnCopy.classList.replace('text-green-700', 'text-teal-700');
            btnCopy.classList.replace('bg-green-100', 'bg-teal-100');
        }, 2000);
    });

    generatePassword();
</script>
{% endblock %}
