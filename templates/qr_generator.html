{% extends "base.html" %}

{% block title %}QR Code Generator - My Gizmo{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-lg border">
    
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Custom QR Code Generator</h1>
    <p class="text-center text-gray-600 mb-8">Enter URL, choose colors, and even add your logo.</p>

    <form action="{{ url_for('qr_generator') }}" method="POST" enctype="multipart/form-data" class="space-y-6">
        
        <div>
            <label for="url" class="block text-sm font-medium text-gray-700 mb-2">URL or Text:</label>
            <input 
                type="text" 
                name="url" 
                id="url"
                placeholder="Enter your URL or text here..." 
                required
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
            >
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="fill_color" class="block text-sm font-medium text-gray-700 mb-2">QR Code Color (Fill):</label>
                <input 
                    type="color" 
                    name="fill_color"
                    id="fill_color"
                    value="#000000"
                    class="w-full h-10 p-1 border border-gray-300 rounded-lg cursor-pointer"
                >
            </div>
            <div>
                <label for="back_color" class="block text-sm font-medium text-gray-700 mb-2">Background Color:</label>
                <input 
                    type="color" 
                    name="back_color"
                    id="back_color"
                    value="#FFFFFF"
                    class="w-full h-10 p-1 border border-gray-300 rounded-lg cursor-pointer"
                >
            </div>
        </div>

        <div>
            <label for="logo_image" class="block text-sm font-medium text-gray-700 mb-2">Add Logo (Optional):</label>
            <input 
                type="file" 
                name="logo_image"
                id="logo_image"
                accept="image/png, image/jpeg, image/jpg"
                class="w-full text-sm text-gray-500
                       file:mr-4 file:py-2 file:px-4
                       file:rounded-lg file:border-0
                       file:font-semibold file:bg-teal-50 file:text-teal-700
                       hover:file:bg-teal-100"
            >
        </div>
        
        <button 
            type="submit"
            class="w-full p-4 font-semibold text-white bg-gradient-to-r from-orange-500 to-blue-600 rounded-lg hover:from-orange-600 hover:to-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-500 transform hover:-translate-y-1 transition-all shadow-lg"
        >
            Generate Custom QR Code
        </button>
    </form>

    {% if qr_image_path %}
    <div class="mt-8 pt-8 border-t border-gray-200">
        <h2 class="text-2xl font-semibold text-center text-gray-800">Your QR Code:</h2>
        
        <img 
            src="{{ url_for('static', filename=qr_image_path) }}?t={{ range(1, 10000) | random }}" 
            alt="Generated QR Code"
            class="mx-auto mt-6 border-8 border-white rounded-xl shadow-lg"
            style="max-width: 300px;"
        >
        
        <a 
            href="{{ url_for('static', filename=qr_image_path) }}?t={{ range(1, 10000) | random }}" 
            download="my_gizmo_qr.png" 
            class="block w-1/2 mx-auto mt-6 p-3 text-center font-semibold text-white bg-green-600 rounded-lg hover:bg-green-700 transform hover:-translate-y-0.5 transition-all shadow-lg"
        >
            Download
        </a>
        
    </div>
    {% endif %}

</div>
{% endblock %}
