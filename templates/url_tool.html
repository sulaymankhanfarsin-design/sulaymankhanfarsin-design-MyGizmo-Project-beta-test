{% extends "base.html" %}

{% block title %}URL Encoder/Decoder - My Gizmo{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
    
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
        URL Encoder / Decoder
    </h1>

    <div class="mb-6">
        <label for="text-input" class="block text-sm font-medium text-gray-700 mb-2">Decoded Text:</label>
        <textarea 
            id="text-input" 
            placeholder="Type a URL or text with special characters like: hello world!@#"
            rows="8"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#35a9e0] focus:border-[#35a9e0] outline-none transition-shadow text-gray-800"
        ></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <button id="btn-encode" class="p-3 font-semibold text-white bg-teal-500 rounded-lg hover:bg-teal-600 transition-all shadow">
            &darr; Encode &darr;
        </button>
        <button id="btn-decode" class="p-3 font-semibold text-white bg-blue-500 rounded-lg hover:bg-blue-600 transition-all shadow">
            &uarr; Decode &uarr;
        </button>
    </div>

    <div class="mb-6">
        <label for="text-output" class="block text-sm font-medium text-gray-700 mb-2">Encoded URL Text:</label>
        <textarea 
            id="text-output" 
            placeholder="URL-safe text will appear here... like: hello%20world!%40%23"
            rows="8"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#35a9e0] focus:border-[#35a9e0] outline-none transition-shadow text-gray-800"
        ></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <button id="btn-copy" class="w-full p-3 bg-gray-200 text-gray-800 font-medium rounded-lg hover:bg-gray-300 transition-colors">Copy Result</button>
        <button id="btn-clear" class="w-full p-3 bg-red-100 text-red-700 font-medium rounded-lg hover:bg-red-200 transition-colors">Clear All</button>
    </div>
</div>

<script>
    const inputArea = document.getElementById('text-input');
    const outputArea = document.getElementById('text-output');

    // Encode
    document.getElementById('btn-encode').addEventListener('click', () => {
        try {
            outputArea.value = encodeURIComponent(inputArea.value);
        } catch (e) {
            outputArea.value = "Error: " + e.message;
        }
    });

    // Decode
    document.getElementById('btn-decode').addEventListener('click', () => {
        try {
            // চেষ্টা করুন উপরের বক্স থেকে ডিকোড করার
            if (inputArea.value.trim().length > 0) {
                 outputArea.value = decodeURIComponent(inputArea.value);
            } 
            // যদি উপরের বক্স খালি থাকে, তবে নিচের বক্স থেকে ডিকোড করুন
            else if (outputArea.value.trim().length > 0) {
                inputArea.value = decodeURIComponent(outputArea.value);
            }
        } catch (e) {
            inputArea.value = "Error: Invalid URL encoding. " + e.message;
        }
    });

    // Copy Result (output)
    document.getElementById('btn-copy').addEventListener('click', () => {
        navigator.clipboard.writeText(outputArea.value);
    });

    // Clear All
    document.getElementById('btn-clear').addEventListener('click', () => {
        inputArea.value = '';
        outputArea.value = '';
    });
</script>
{% endblock %}
